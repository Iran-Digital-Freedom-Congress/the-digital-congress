  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)"/>
  <text x="600" y="613" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" font-weight="600" fill="#ffffff" letter-spacing="2">difcongress.com</text>
