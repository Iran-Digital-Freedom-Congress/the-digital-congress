<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Vazirmatn:wght@400;700&amp;display=swap');
    </style>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="8%" stop-color="#BFDBFE"/>
      <stop offset="43%" stop-color="#BAE6FD"/>
      <stop offset="92%" stop-color="#F5F7FA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <circle cx="100" cy="530" r="180" fill="#3B82F6" opacity="0.05"/>
  <circle cx="1100" cy="100" r="200" fill="#0EA5E9" opacity="0.05"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>
  <text x="600" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="68" font-weight="800" fill="#F59E0B" style="filter:drop-shadow(0 0 6px #F59E0B) drop-shadow(0 0 14px rgba(245,158,11,0.5))">◆</text>
  <text x="600" y="290" text-anchor="middle" font-family="Vazirmatn, Inter, sans-serif" font-size="44" font-weight="700" fill="rgba(0,0,0,0.87)" direction="rtl">ایرانئے آزاتیئے ڈیجیٹالی کانگرس</text>
  <text x="600" y="370" text-anchor="middle" font-family="Vazirmatn, Inter, sans-serif" font-size="24" font-weight="400" fill="rgba(0,0,0,0.56)" direction="rtl">ایرانیانئے ساریا پدگیری سیاسی جاگه.</text>
  <text x="600" y="410" text-anchor="middle" font-family="Vazirmatn, Inter, sans-serif" font-size="24" font-weight="400" fill="rgba(0,0,0,0.56)" direction="rtl">هر هپتگئے آخرا، بے سرحد.</text>
