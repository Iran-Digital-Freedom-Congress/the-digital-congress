<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Iran Freedom Congress</title>
  <meta name="description" content="A continuous, digital-first political engagement space for Iranians.">
  <meta http-equiv="refresh" content="0;url=en/">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      color: #1a1a2e;
    }
    .picker { text-align: center; max-width: 480px; padding: 2rem; }

    p { color: #64748b; margin-bottom: 2rem; }
    .langs { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: block; padding: 1rem 2.5rem; border-radius: 12px;
      text-decoration: none; font-weight: 600; font-size: 1.1rem;
      border: 2px solid #e2e8f0; color: #1a1a2e; transition: all .2s;
    }
    a:hover { border-color: #0d9488; color: #0d9488; }
    a small { display: block; font-weight: 400; font-size: 0.85rem; color: #64748b; margin-top: 0.25rem; }

</head>
<body>
  <div class="picker">

    <div class="langs">
      <a href="en/">English<small>English</small></a>
      <a href="fa/">فارسی<small>Persian</small></a>

      <a href="ar/">العربية<small>Arabic</small></a>
      <a href="bal/">بلوچی<small>Baluchi</small></a>
      <a href="az/">تۆرکجه<small>Azeri Turkish</small></a>

  </div>
