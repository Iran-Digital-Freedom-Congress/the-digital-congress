<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap');
    </style>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="8%" stop-color="#BFDBFE"/>
      <stop offset="43%" stop-color="#BAE6FD"/>
      <stop offset="92%" stop-color="#F5F7FA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feColorMatrix in="blur1" type="matrix" values="1 0 0 0 0  0.64 0 0 0 0  0 0.04 0 0 0  0 0 0 0.5 0" result="glow1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <circle cx="100" cy="530" r="180" fill="#3B82F6" opacity="0.05"/>
  <circle cx="1100" cy="100" r="200" fill="#0EA5E9" opacity="0.05"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>
  <text x="600" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="68" font-weight="800" fill="#F59E0B" filter="url(#glow)">◆</text>
  <text x="600" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="rgba(0,0,0,0.87)">Digital Iran Freedom Congress</text>
  <text x="600" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="rgba(0,0,0,0.56)">A Continuous Political Engagement Space</text>
  <text x="600" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="rgba(0,0,0,0.56)">Every Weekend, Without End</text>
  <rect x="480" y="440" width="240" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  <text x="600" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#3B82F6">Planning Phase — Join the Conversation</text>
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)"/>
  <text x="600" y="613" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" font-weight="600" fill="#ffffff" letter-spacing="2">difcongress.com</text>
</svg>
